<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎲 AI 로또 예측기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0b0e1a, #1a1f2f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 32px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .sub {
            text-align: center;
            color: #8b95b0;
            font-size: 14px;
            margin-bottom: 28px;
            font-weight: 300;
        }
        .input-group {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 24px;
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            color: #fff;
            outline: none;
            text-align: center;
        }
        .input-group input::placeholder {
            color: #5a6680;
            font-weight: 300;
        }
        .input-group button {
            background: #f7b731;
            border: none;
            color: #0b0e1a;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .input-group button:hover {
            background: #ffd166;
            transform: scale(1.02);
        }
        .reset-btn {
            display: block;
            width: 100%;
            margin: -12px 0 24px;
            padding: 10px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: #8b95b0;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .latest-box {
            background: linear-gradient(145deg, rgba(247, 183, 49, 0.12), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(247, 183, 49, 0.25);
            border-radius: 18px;
            padding: 16px 18px 14px;
            margin-bottom: 24px;
        }
        .latest-box:empty {
            display: none;
        }
        .latest-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
            gap: 8px;
        }
        .latest-title {
            color: #fff;
            font-weight: 700;
            font-size: 16px;
        }
        .latest-date {
            color: #8b95b0;
            font-size: 13px;
            font-weight: 300;
            white-space: nowrap;
        }
        .latest-balls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .latest-plus {
            color: #8b95b0;
            font-weight: 700;
            font-size: 18px;
        }
        .result-area {
            margin-top: 8px;
        }
        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.15s;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }
        .result-label {
            font-weight: 700;
            color: #f7b731;
            font-size: 18px;
            min-width: 10px;
        }
        .result-numbers {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
            justify-content: center;
        }
        .ball {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            background: #2a3145;
            box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.3);
        }
        .ball.gold {
            background: #d4a11e;
        }
        .ball.blue {
            background: #1e6fc4;
        }
        .ball.red {
            background: #c43e1e;
        }
        .ball.gray {
            background: #6b7280;
        }
        .ball.green {
            background: #1ea86b;
        }
        .no-data {
            text-align: center;
            color: #5a6680;
            padding: 40px 0;
            font-size: 15px;
        }
        .footer {
            margin-top: 28px;
            text-align: center;
            color: #6b7793;
            font-size: 12px;
            line-height: 1.7;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 20px;
        }
        .footer strong {
            color: #cdd5e6;
        }
        .loading {
            text-align: center;
            color: #8b95b0;
            padding: 20px;
        }
        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }
            .input-group {
                flex-wrap: wrap;
                background: transparent;
                border: none;
                padding: 0;
            }
            .input-group input {
                background: rgba(255, 255, 255, 0.04);
                border-radius: 40px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                flex: 1 1 100%;
            }
            .input-group button {
                flex: 1 1 100%;
                justify-content: center;
                margin-top: 6px;
            }
            .result-item {
                padding: 12px 12px;
                gap: 8px;
                flex-wrap: nowrap;
            }
            .result-label {
                font-size: 15px;
                min-width: 12px;
            }
            .result-numbers {
                gap: 5px;
                flex-wrap: nowrap;
                flex: 1;
                justify-content: center;
            }
            .ball {
                width: 30px;
                height: 30px;
                font-size: 12px;
            }
            .latest-balls {
                gap: 5px;
                justify-content: center;
            }
            .latest-plus {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎲 AI 로또 예측기</h1>

        <div class="input-group">
            <input type="text" id="seedInput" placeholder="행운의 숫자 (최대 13자리)" maxlength="13" />
            <button id="predictBtn">✨ 예측하기</button>
        </div>

        <button id="resetBtn" class="reset-btn">🔄 행운의 번호 초기화</button>

        <div class="latest-box" id="latestDraw"></div>

        <div class="result-area" id="resultArea">
            <div class="loading">📂 데이터를 불러오는 중...</div>
        </div>

        <div class="footer">
            📊 입력한 행운의 숫자를 시드로 반영하여 <strong>5가지</strong> 조합을 추천합니다.<br>
            통계 기반 참고용 · 당첨을 보장하지 않습니다 🍀
        </div>
    </div>

    <script>
        // ============================================================
        // 1. 데이터 로드 (lotto_data.json)
        // ============================================================
        let draws = [];

        async function loadData() {
            try {
                const response = await fetch('lotto_data.json');
                if (!response.ok) throw new Error('JSON 파일을 불러올 수 없습니다.');
                const rawData = await response.json();
                // rawData: [[회차, 번호1...6, 보너스, "날짜"], ...]
                draws = rawData.map(row => ({
                    회차: row[0],
                    번호: row.slice(1, 7).sort((a, b) => a - b),
                    보너스: row[7],
                    날짜: row[8]
                }));
                // 회차 정보 기준으로 오름차순 정렬 (통계의 '최근 N회'가 항상 정확하도록)
                draws.sort((a, b) => a.회차 - b.회차);
                // 1회차부터 빠짐없이 연속이어야 함 — 누락/중복 시 콘솔 경고
                draws.forEach((d, idx) => {
                    if (d.회차 !== idx + 1) {
                        console.warn(`회차 불일치: 위치 ${idx}에 ${d.회차}회 (기대값 ${idx + 1}회)`);
                    }
                });
                const latest = draws[draws.length - 1];
                console.info(`로또 데이터 로드: 총 ${draws.length}회차, 최신 ${latest.회차}회 ` +
                    `(${latest.날짜}) [${latest.번호.join(', ')}] + 보너스 ${latest.보너스}`);
                // 가장 마지막 회차의 실제 당첨번호를 화면에 표시
                renderLatestDraw(latest);
                // 저장된 사용자 행운의 숫자가 있으면 그 값을, 없으면 랜덤값을 사용해 초기 예측
                const seed = loadLuckyNumber() || Math.floor(Math.random() * 10000000000).toString();
                document.getElementById('seedInput').value = seed;
                document.getElementById('predictBtn').click();
            } catch (e) {
                document.getElementById('resultArea').innerHTML =
                    `<div class="no-data">⚠️ 데이터 로드 실패: ${e.message}<br>lotto_data.json 파일을 확인해주세요.</div>`;
                console.error(e);
            }
        }

        // ============================================================
        // 2. 위치별 통계 및 점수 계산
        // ============================================================
        function computeScores(draws) {
            const totalDraws = draws.length;
            const totalPosFreq = Array.from({ length: 6 }, () => ({}));
            const recentPosFreq = Array.from({ length: 6 }, () => ({}));
            const lastSeenPos = Array.from({ length: 6 }, () => ({}));

            for (let pos = 0; pos < 6; pos++) {
                for (let n = 1; n <= 45; n++) {
                    totalPosFreq[pos][n] = 0;
                    recentPosFreq[pos][n] = 0;
                    lastSeenPos[pos][n] = -1;
                }
            }

            draws.forEach((d, idx) => {
                d.번호.forEach((num, pos) => {
                    totalPosFreq[pos][num] = (totalPosFreq[pos][num] || 0) + 1;
                    lastSeenPos[pos][num] = idx;
                    if (idx >= totalDraws - 30) {
                        recentPosFreq[pos][num] = (recentPosFreq[pos][num] || 0) + 1;
                    }
                });
            });

            const currentIdx = totalDraws - 1;

            function rankScore(counter, num) {
                const freq = counter[num] || 0;
                const freqs = Object.values(counter).sort((a, b) => b - a);
                let rank = 1;
                for (let i = 0; i < freqs.length; i++) {
                    if (freq === freqs[i]) { rank = 45 - i; break; }
                }
                return rank;
            }

            const missingRankByPos = Array.from({ length: 6 }, () => ({}));
            for (let pos = 0; pos < 6; pos++) {
                const daysList = [];
                for (let n = 1; n <= 45; n++) {
                    daysList.push(currentIdx - lastSeenPos[pos][n]);
                }
                const sortedDays = [...daysList].sort((a, b) => b - a);
                for (let n = 1; n <= 45; n++) {
                    const days = currentIdx - lastSeenPos[pos][n];
                    let rank = 1;
                    for (let i = 0; i < sortedDays.length; i++) {
                        if (days === sortedDays[i]) { rank = 45 - i; break; }
                    }
                    missingRankByPos[pos][n] = rank;
                }
            }

            const scores = {};
            for (let n = 1; n <= 45; n++) {
                let totalRankSum = 0,
                    recentRankSum = 0,
                    missingRankSum = 0;
                for (let pos = 0; pos < 6; pos++) {
                    totalRankSum += rankScore(totalPosFreq[pos], n);
                    recentRankSum += rankScore(recentPosFreq[pos], n);
                    missingRankSum += missingRankByPos[pos][n];
                }
                scores[n] = 0.4 * (totalRankSum / 6) + 0.3 * (recentRankSum / 6) + 0.3 * (missingRankSum / 6);
            }
            return scores;
        }

        // ============================================================
        // 3. 조합 생성 및 예측
        // ============================================================
        function getCombinations(arr, k) {
            if (k === 0) return [
                []
            ];
            if (arr.length === 0) return [];
            const [first, ...rest] = arr;
            const withFirst = getCombinations(rest, k - 1).map(c => [first, ...c]);
            const withoutFirst = getCombinations(rest, k);
            return [...withFirst, ...withoutFirst];
        }

        function generatePredictions(draws, seed) {
            if (draws.length === 0) return [];
            const scores = computeScores(draws);
            const rng = new Math.seedrandom(seed.toString());

            // 상위 8개 풀
            const sortedByScore = Array.from({ length: 45 }, (_, i) => i + 1)
                .sort((a, b) => scores[b] - scores[a]);
            let topPool = sortedByScore.slice(0, 8);

            // 시드로 섞기
            for (let i = topPool.length - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [topPool[i], topPool[j]] = [topPool[j], topPool[i]];
            }

            const allCombos = getCombinations(topPool, 6);
            const valid = [];
            for (const combo of allCombos) {
                const sum = combo.reduce((a, b) => a + b, 0);
                const oddCnt = combo.filter(n => n % 2 === 1).length;
                if (sum < 100 || sum > 170) continue;
                if (oddCnt < 2 || oddCnt > 4) continue;
                const avgScore = combo.reduce((a, b) => a + scores[b], 0) / 6;
                valid.push({ combo, avgScore });
            }

            valid.sort((a, b) => b.avgScore - a.avgScore);
            const top10 = valid.slice(0, 10);
            for (let i = top10.length - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [top10[i], top10[j]] = [top10[j], top10[i]];
            }
            return top10.slice(0, 5).map(item => item.combo);
        }

        // ============================================================
        // 4. UI 렌더링
        // ============================================================
        function getBallClass(num) {
            if (num <= 10) return 'gold';
            if (num <= 20) return 'blue';
            if (num <= 30) return 'red';
            if (num <= 40) return 'gray';
            return 'green';
        }

        // 가장 마지막 회차의 회차번호 · 날짜 · 당첨번호 · 보너스 표시
        function renderLatestDraw(d) {
            const el = document.getElementById('latestDraw');
            if (!el || !d) return;
            const balls = d.번호
                .map(n => `<span class="ball ${getBallClass(n)}">${n}</span>`)
                .join('');
            el.innerHTML = `
                <div class="latest-head">
                    <span class="latest-title">🏆 ${d.회차}회 당첨번호</span>
                    <span class="latest-date">${d.날짜} 추첨</span>
                </div>
                <div class="latest-balls">
                    ${balls}
                    <span class="latest-plus">+</span>
                    <span class="ball ${getBallClass(d.보너스)}">${d.보너스}</span>
                </div>`;
        }

        function renderResults(combos) {
            const area = document.getElementById('resultArea');
            if (!combos || combos.length === 0) {
                area.innerHTML = `<div class="no-data">😅 조건에 맞는 조합이 없습니다. 다른 시도를 해보세요.</div>`;
                return;
            }
            const labels = ['A', 'B', 'C', 'D', 'E'];
            let html = '';
            combos.forEach((combo, idx) => {
                const sorted = [...combo].sort((a, b) => a - b);
                html += `<div class="result-item">
                        <span class="result-label">${labels[idx]}</span>
                        <div class="result-numbers">`;
                sorted.forEach(num => {
                    html += `<span class="ball ${getBallClass(num)}">${num}</span>`;
                });
                html += `</div></div>`;
            });
            area.innerHTML = html;
        }

        // ============================================================
        // 5. 이벤트 바인딩
        // ============================================================
        document.getElementById('predictBtn').addEventListener('click', function() {
            const input = document.getElementById('seedInput');
            let seed = input.value.trim();
            if (seed === '') {
                // 비운 채로 예측하면: 랜덤 번호를 부여하고 저장된 행운의 번호는 삭제
                seed = Math.floor(Math.random() * 10000000000).toString();
                input.value = seed;
                clearLuckyNumber();
            } else if (!/^\d{1,13}$/.test(seed)) {
                alert('⚠️ 13자리 이하의 숫자만 입력해주세요.');
                return;
            }
            const combos = generatePredictions(draws, seed);
            renderResults(combos);
        });

        document.getElementById('seedInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('predictBtn').click();
            }
        });

        // 행운의 번호 초기화: 저장값 삭제 + 새 랜덤 번호 부여 후 예측
        document.getElementById('resetBtn').addEventListener('click', function() {
            clearLuckyNumber();
            const seed = Math.floor(Math.random() * 10000000000).toString();
            document.getElementById('seedInput').value = seed;
            renderResults(generatePredictions(draws, seed));
        });

        // 사용자가 '직접 입력'한 값만 저장한다.
        // (프로그램적인 .value 설정은 input 이벤트를 발생시키지 않으므로
        //  접속 시 표시되는 랜덤 값은 저장되지 않는다.)
        document.getElementById('seedInput').addEventListener('input', function() {
            const v = this.value.trim();
            if (/^\d{1,13}$/.test(v)) {
                saveLuckyNumber(v);
            }
        });

        // ============================================================
        // 6. 행운의 숫자 저장/불러오기 (localStorage)
        // ============================================================
        const LUCKY_KEY = 'luckyNumber';

        function loadLuckyNumber() {
            try {
                const v = localStorage.getItem(LUCKY_KEY);
                return (v && /^\d{1,13}$/.test(v)) ? v : null;
            } catch (e) {
                return null; // localStorage 미지원/차단 시 랜덤값으로 대체
            }
        }

        function saveLuckyNumber(v) {
            try {
                localStorage.setItem(LUCKY_KEY, v);
            } catch (e) {
                /* 저장 불가 환경은 무시 */
            }
        }

        function clearLuckyNumber() {
            try {
                localStorage.removeItem(LUCKY_KEY);
            } catch (e) {
                /* 무시 */
            }
        }

        // ============================================================
        // 7. 시작
        // ============================================================
        loadData();
    </script>

</body>
</html>
