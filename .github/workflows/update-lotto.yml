name: Update Lotto Data

# 매주 토요일 추첨(약 20:45 KST) 이후 공식 dhlottery API에서
# 최신 회차를 가져와 lotto_data.json 을 갱신한다.
on:
  schedule:
    # 토 13:00 UTC (= 일 22:00 KST) — 추첨 직후
    - cron: '0 13 * * 6'
    # 일 02:00 UTC (= 일 11:00 KST) — 백업 (1차 실패/지연 대비)
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lotto
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch latest draws from dhlottery
        run: python update_lotto_data.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- lotto_data.json; then
            echo "변경 사항 없음 — 커밋 생략"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto_data.json
          git commit -m "chore: update lotto_data.json with latest draw"
          git push
