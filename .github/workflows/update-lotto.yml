name: Update Lotto Data

# 매주 토요일 추첨(약 20:45 KST) 이후 공식 dhlottery API에서
# 최신 회차를 가져와 lotto_data.json 을 갱신한다.
on:
  schedule:
    # 추첨은 매주 토 20:45 KST. 일요일 0시·3시·6시(KST)에 3번 시도.
    # KST = UTC+9 이므로 UTC 기준으로는 토요일 15시·18시·21시.
    - cron: '0 15 * * 6'   # 일 00:00 KST
    - cron: '0 18 * * 6'   # 일 03:00 KST
    - cron: '0 21 * * 6'   # 일 06:00 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lotto
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch latest draws from dhlottery
        run: python update_lotto_data.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- lotto_data.json; then
            echo "변경 사항 없음 — 커밋 생략"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto_data.json
          git commit -m "chore: update lotto_data.json with latest draw"
          git push
